<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="theme-color" content="#222018">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="travala">
<title>travala — city guide</title>
<style>
  :root{--ink:#222018;--ink-soft:#4a463b;--coral:#E8622E;--coral-dark:#c44e20;--cream:#F7F5EF;--cream-deep:#efece2;--teal:#2F9E8F;--line:#e2ddd0;--line-soft:#ebe7db;--white:#fff}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--cream);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
  a{text-decoration:none;color:inherit}
  .app{display:flex;min-height:100vh}
  .side{width:240px;background:var(--white);border-right:1px solid var(--line-soft);padding:22px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;flex-shrink:0}
  .wordmark{font-weight:600;letter-spacing:-0.03em;font-size:22px;position:relative;display:inline-block;padding:6px 8px 20px}
  .wordmark .dot{position:absolute;width:5.5px;height:5.5px;border-radius:50%;background:var(--coral);top:8px;right:6px}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;font-size:14.5px;color:var(--ink-soft);margin-bottom:3px;transition:all .15s}
  .nav-item .ic{font-size:18px;width:22px;text-align:center}
  .nav-item:hover{background:var(--cream)}
  .nav-item.active{background:var(--ink);color:var(--cream);font-weight:500}
  .side .spacer{flex:1}
  .wallet-mini{background:var(--cream);border-radius:13px;padding:14px;font-size:13px}
  .wallet-mini .row{display:flex;justify-content:space-between;align-items:center}
  .wallet-mini .bal{font-weight:600;font-size:16px}.wallet-mini .addr{font-family:'SF Mono',monospace;font-size:12px;color:var(--ink-soft)}
  .wallet-mini .mon{font-size:11px;color:var(--teal);background:rgba(47,158,143,0.1);padding:2px 7px;border-radius:100px}
  .main{flex:1;padding:32px 40px 64px;max-width:1000px;margin:0 auto;width:100%}
  @media(max-width:900px){.side{display:none}.main{padding:24px 20px 60px}}
  .page-head{margin-bottom:26px}
  .page-head h1{font-size:26px;letter-spacing:-0.02em;font-weight:600}
  .page-head .loc{font-size:14px;color:var(--ink-soft);margin-top:4px}
  .dl-strip{display:flex;align-items:center;gap:10px;background:rgba(47,158,143,0.08);border:1px solid rgba(47,158,143,0.2);border-radius:12px;padding:12px 16px;font-size:13.5px;color:var(--teal-dark,#237a6e);margin-bottom:24px}
  .dl-strip button{margin-left:auto;font-family:inherit;font-size:13px;font-weight:500;background:var(--teal);color:#fff;border:none;padding:8px 14px;border-radius:9px;cursor:pointer}
  .tabs{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap}
  .tab{font-family:inherit;font-size:13.5px;font-weight:450;padding:9px 15px;border-radius:100px;border:1px solid var(--line);background:var(--white);cursor:pointer;transition:all .15s}
  .tab:hover{border-color:var(--ink)}
  .tab.active{background:var(--ink);color:var(--cream);border-color:var(--ink);font-weight:500}
  .card{background:var(--white);border:1px solid var(--line-soft);border-radius:16px;padding:24px;margin-bottom:16px}
  .card h2{font-size:17px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:10px}
  .card h2 .ico{font-size:20px}
  .kv{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--line-soft)}
  .kv:last-child{border-bottom:none;padding-bottom:0}
  .kv .k{flex-shrink:0;width:140px;font-size:14px;font-weight:500}
  .kv .v{font-size:14px;color:var(--ink-soft)}
  .hood{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--line-soft)}
  .hood:last-child{border-bottom:none;padding-bottom:0}
  .hood .tag{flex-shrink:0;font-size:11px;font-weight:500;padding:4px 10px;border-radius:100px;height:fit-content}
  .tag-tour{background:rgba(232,98,46,0.12);color:var(--coral-dark)}
  .tag-res{background:rgba(47,158,143,0.12);color:#237a6e}
  .tag-night{background:rgba(107,70,193,0.12);color:#5b3ac4}
  .tag-central{background:rgba(74,70,59,0.1);color:var(--ink-soft)}
  .hood .nm{font-size:15px;font-weight:500}.hood .ds{font-size:13.5px;color:var(--ink-soft)}
  .phrase{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--line-soft)}
  .phrase:last-child{border-bottom:none;padding-bottom:0}
  .phrase .en{font-size:14px;color:var(--ink-soft)}
  .phrase .fo{font-size:15px;font-weight:500;text-align:right}
  .phrase .fo small{display:block;font-weight:400;color:var(--ink-soft);font-size:12px;font-style:italic}
  .panel{display:none}.panel.show{display:block}
  .loading{padding:40px;text-align:center;color:var(--ink-soft);font-size:14px}
  .err{padding:16px;background:rgba(232,98,46,0.08);border:1px solid rgba(232,98,46,0.2);border-radius:12px;color:var(--coral-dark);font-size:13.5px}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="wordmark">travala<span class="dot"></span></div>
    <a href="dashboard.html" class="nav-item"><span class="ic">▦</span>Dashboard</a>
    <a href="guide.html" class="nav-item active"><span class="ic">🧭</span>City guide</a>
    <a href="help.html" class="nav-item"><span class="ic">🆘</span>Local help</a>
    <a href="money.html" class="nav-item"><span class="ic">💸</span>Money</a>
    <a href="recommendations.html" class="nav-item"><span class="ic">⭐</span>Rate &amp; recommend</a>
    <a href="stamp.html" class="nav-item"><span class="ic">🏷️</span>Check a stamp</a>
    <div class="spacer"></div>
    <a href="settings.html" class="nav-item"><span class="ic">⚙️</span>Settings</a>
    <a href="settings.html" style="margin-top:8px"><div class="wallet-mini"><div class="row"><span class="addr" id="walletAddr">loading…</span><span class="mon">Monad</span></div><div class="row"><span class="bal" id="walletBal">–</span></div></div></a>
  </aside>

  <main class="main">
    <div class="page-head">
      <h1 id="cityTitle">Loading city guide…</h1>
      <div class="loc" id="cityLoc"></div>
    </div>
    <div class="dl-strip">⬇ Download this guide for offline use — works when your signal doesn't.<button onclick="downloadGuide()">Download</button></div>

    <div class="tabs">
      <button class="tab active" onclick="show('essentials',this)">Essentials</button>
      <button class="tab" onclick="show('etiquette',this)">Etiquette</button>
      <button class="tab" onclick="show('hoods',this)">Neighborhoods</button>
      <button class="tab" onclick="show('rhythm',this)">Daily rhythm</button>
      <button class="tab" onclick="show('getting',this)">Getting around</button>
      <button class="tab" onclick="show('phrases',this)">Phrases</button>
    </div>

    <div class="panel show" id="essentials"><div class="loading">Loading…</div></div>
    <div class="panel" id="etiquette"></div>
    <div class="panel" id="hoods"></div>
    <div class="panel" id="rhythm"></div>
    <div class="panel" id="getting"></div>
    <div class="panel" id="phrases"></div>
  </main>
</div>
<script>
  const CONTENT_API = "https://content-api-zr40.onrender.com";

  // Reads the city actually picked at login (persisted there) - falls back
  // to prompting rather than silently showing an unrelated city's data.
  function citySlug(){
    const city = localStorage.getItem('travala_city');
    const country = localStorage.getItem('travala_country');
    if (!city || !country) return null;
    return `${city}-${country}`.toLowerCase().trim().replace(/\s+/g, '-');
  }
  const CITY_SLUG = citySlug();
  let cityData = null;

  function show(id, btn){
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));
    document.getElementById(id).classList.add('show');
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
  }

  function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

  const NOT_YET = `<div style="color:var(--ink-soft);font-size:14px">Detailed guide content for this city hasn't been written yet - it's on the roster but not yet researched in depth.</div>`;

  function renderEssentials(data){
    let html = `<div class="card"><h2><span class="ico">🛂</span>Entry &amp; visa</h2>`;
    if (data.entryRequirements) {
      html += `<div class="kv"><div class="k">Visa</div><div class="v">${esc(data.entryRequirements.visaNote)}</div></div>`;
      if (data.entryRequirements.officialSource) {
        html += `<div class="kv"><div class="k">Official source</div><div class="v">${esc(data.entryRequirements.officialSource)}</div></div>`;
      }
    } else {
      html += NOT_YET;
    }
    html += `</div>`;

    html += `<div class="card"><h2><span class="ico">📅</span>Public holidays (2026)</h2>`;
    if (Array.isArray(data.publicHolidays2026) && data.publicHolidays2026.length) {
      html += data.publicHolidays2026.map(h => `<div class="kv"><div class="k">${esc(h.date)}</div><div class="v">${esc(h.name)}</div></div>`).join('');
    } else if (typeof data.publicHolidays2026 === 'string') {
      html += `<div class="kv"><div class="v">${esc(data.publicHolidays2026)}</div></div>`;
    } else {
      html += NOT_YET;
    }
    html += `</div>`;

    if (data.majorEventsNote) {
      html += `<div class="card"><h2><span class="ico">🎉</span>Worth knowing</h2><div class="kv"><div class="v">${esc(data.majorEventsNote)}</div></div></div>`;
    }
    document.getElementById('essentials').innerHTML = html;
  }

  function renderEtiquette(data){
    document.getElementById('etiquette').innerHTML = `<div class="card"><h2><span class="ico">🤝</span>Customs &amp; etiquette</h2>` +
      (data.etiquette.length
        ? data.etiquette.map(e => `<div class="kv"><div class="k">${esc(e.title)}</div><div class="v">${esc(e.text)}</div></div>`).join('')
        : NOT_YET) +
      `</div>`;
  }

  function renderHoods(data){
    const tagClass = { "Touristy":"tag-tour", "Nightlife":"tag-night", "Local":"tag-res", "Central":"tag-central", "Historic":"tag-central" };
    document.getElementById('hoods').innerHTML = `<div class="card"><h2><span class="ico">🗺️</span>Neighborhoods</h2>` +
      (data.neighborhoods.length
        ? data.neighborhoods.map(h => `<div class="hood"><span class="tag ${tagClass[h.tag]||'tag-central'}">${esc(h.tag)}</span><div><div class="nm">${esc(h.name)}</div><div class="ds">${esc(h.description)}</div></div></div>`).join('')
        : NOT_YET) +
      `</div>`;
  }

  function renderRhythm(data){
    document.getElementById('rhythm').innerHTML = `<div class="card"><h2><span class="ico">🕰️</span>Daily rhythm</h2>` +
      (data.dailyRhythm.length
        ? data.dailyRhythm.map(r => `<div class="kv"><div class="k">${esc(r.label)}</div><div class="v">${esc(r.text)}</div></div>`).join('')
        : NOT_YET) +
      `</div>`;
  }

  function renderGetting(data){
    let html = `<div class="card"><h2><span class="ico">🚇</span>Getting around like a local</h2>`;
    if (data.gettingAround.length) {
      html += data.gettingAround.map(g => `<div class="kv"><div class="k">${esc(g.label)}</div><div class="v">${esc(g.text)}</div></div>`).join('');
    } else if (data.transportInfo) {
      html += `<div class="kv"><div class="k">Payment</div><div class="v">${esc(data.transportInfo.paymentCard || '')}</div></div>`;
      if (data.transportInfo.mainSystems && data.transportInfo.mainSystems.length) {
        html += `<div class="kv"><div class="k">Main systems</div><div class="v">${data.transportInfo.mainSystems.map(esc).join(', ')}</div></div>`;
      }
      if (data.transportInfo.note) {
        html += `<div class="kv"><div class="k">Note</div><div class="v">${esc(data.transportInfo.note)}</div></div>`;
      }
    } else {
      html += NOT_YET;
    }
    html += `</div>`;
    document.getElementById('getting').innerHTML = html;
  }

  function renderPhrases(data){
    document.getElementById('phrases').innerHTML = `<div class="card"><h2><span class="ico">💬</span>Phrases that actually help</h2>` +
      (data.phrases.length
        ? data.phrases.map(p => `<div class="phrase"><span class="en">${esc(p.en)}</span><span class="fo">${esc(p.local)}<small>${esc(p.phonetic)}</small></span></div>`).join('')
        : NOT_YET) +
      `</div>`;
  }

  async function loadGuide(){
    if (!CITY_SLUG) {
      document.getElementById('essentials').innerHTML = `<div class="err">No location set yet - <a href="login.html">set your city</a> to load its real guide.</div>`;
      return;
    }
    try {
      const res = await fetch(`${CONTENT_API}/cities/${CITY_SLUG}`);
      if (res.status === 404) {
        document.getElementById('essentials').innerHTML = `<div class="err">No guide data exists yet for ${localStorage.getItem('travala_city')}, ${localStorage.getItem('travala_country')} - this city hasn't been researched yet, but you can still explore it and mint its stamp.</div>`;
        return;
      }
      if (!res.ok) throw new Error(`content-api returned ${res.status}`);
      cityData = await res.json();

      document.getElementById('cityTitle').textContent = `${cityData.city} city guide`;
      document.getElementById('cityLoc').textContent = `${cityData.country} · everything to help you fit right in`;

      renderEssentials(cityData);
      renderEtiquette(cityData);
      renderHoods(cityData);
      renderRhythm(cityData);
      renderGetting(cityData);
      renderPhrases(cityData);
    } catch (err) {
      document.getElementById('essentials').innerHTML = `<div class="err">Couldn't load the live city guide (${esc(err.message)}). The content service may be waking up from idle - try refreshing in a few seconds.</div>`;
    }
  }

  function downloadGuide(){
    if (!cityData) return;
    const blob = new Blob([JSON.stringify(cityData, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${CITY_SLUG}-guide.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  async function loadWallet(){
    const { requireWallet } = await import("./wallet.js");
    const { ethers } = await import("https://esm.sh/ethers@6.14.0");
    const wallet = await requireWallet();
    document.getElementById('walletAddr').textContent = wallet.address.slice(0,6) + '…' + wallet.address.slice(-4);
    try {
      const bal = await wallet.provider.getBalance(wallet.address);
      document.getElementById('walletBal').textContent = Number(ethers.formatEther(bal)).toFixed(3) + ' MON';
    } catch {
      document.getElementById('walletBal').textContent = '—';
    }
  }

  loadWallet();
  loadGuide();
</script>
</body>
</html>
