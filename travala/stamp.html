<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>travala — stamp</title>
<style>
  :root{--ink:#222018;--ink-soft:#4a463b;--coral:#E8622E;--coral-dark:#c44e20;--cream:#F7F5EF;--cream-deep:#efece2;--teal:#2F9E8F;--teal-dark:#237a6e;--line:#e2ddd0;--line-soft:#ebe7db;--white:#fff}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--cream);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
  a{text-decoration:none;color:inherit}
  .app{display:flex;min-height:100vh}
  .side{width:240px;background:var(--white);border-right:1px solid var(--line-soft);padding:22px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;flex-shrink:0}
  .wordmark{font-weight:600;letter-spacing:-0.03em;font-size:22px;position:relative;display:inline-block;padding:6px 8px 20px}
  .wordmark .dot{position:absolute;width:5.5px;height:5.5px;border-radius:50%;background:var(--coral);top:8px;right:6px}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;font-size:14.5px;color:var(--ink-soft);margin-bottom:3px;transition:all .15s}
  .nav-item .ic{font-size:18px;width:22px;text-align:center}
  .nav-item:hover{background:var(--cream)}.nav-item.active{background:var(--ink);color:var(--cream);font-weight:500}
  .side .spacer{flex:1}
  .main{flex:1;padding:32px 40px 64px;max-width:920px;margin:0 auto;width:100%}
  @media(max-width:900px){.side{display:none}.main{padding:24px 20px 60px}.hero{grid-template-columns:1fr!important}}
  .search{display:flex;gap:10px;margin-bottom:24px}
  .search input{flex:1;font-family:'SF Mono',monospace;font-size:14px;padding:12px 14px;border:1px solid var(--line);border-radius:11px;background:var(--white)}
  .search button{font-family:inherit;font-size:14px;font-weight:500;padding:12px 20px;border-radius:11px;background:var(--coral);color:#fff;border:none;cursor:pointer}
  .hero{display:grid;grid-template-columns:auto 1fr;gap:28px;align-items:center;margin-bottom:14px}
  .big-stamp{width:180px;height:180px;border-radius:20px;background:var(--ink);border:2px dashed rgba(232,98,46,0.5);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--cream);position:relative;flex-shrink:0}
  .big-stamp .ring{position:absolute;inset:14px;border:1.5px solid rgba(247,245,239,0.15);border-radius:14px}
  .big-stamp .city{font-size:28px;font-weight:600;letter-spacing:-0.02em}
  .big-stamp .country{font-size:12px;color:var(--teal);letter-spacing:0.1em;text-transform:uppercase;margin-top:6px}
  .hero-info h1{font-size:28px;letter-spacing:-0.02em;font-weight:600}
  .hero-info .meta{font-size:14px;color:var(--ink-soft);margin-top:6px}
  .badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .badge{font-size:12px;font-weight:500;padding:5px 12px;border-radius:100px;display:inline-flex;gap:6px;align-items:center}
  .badge.soul{background:rgba(47,158,143,0.1);color:var(--teal-dark)}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:22px 0}
  .stat{background:var(--white);border:1px solid var(--line-soft);border-radius:14px;padding:18px}
  .stat .v{font-size:24px;font-weight:600;letter-spacing:-0.02em}
  .stat .l{font-size:12.5px;color:var(--ink-soft);margin-top:2px}
  .section-title{font-size:15px;font-weight:600;margin:26px 0 6px;display:flex;align-items:center;justify-content:space-between}
  .section-note{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px}
  .svc{display:flex;align-items:center;gap:16px;background:var(--white);border:1px solid var(--line-soft);border-radius:14px;padding:16px 18px;margin-bottom:10px}
  .svc .ic{width:46px;height:46px;border-radius:12px;background:var(--cream-deep);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
  .svc .info{flex:1;min-width:0}
  .svc .nm{font-size:14px;font-weight:600;font-family:'SF Mono',monospace;overflow:hidden;text-overflow:ellipsis}
  .svc .type{font-size:12.5px;color:var(--ink-soft)}
  .svc .tag{display:inline-block;font-size:11.5px;background:var(--cream-deep);color:var(--ink-soft);padding:2px 9px;border-radius:100px;margin-top:5px}
  .svc .rate-col{text-align:right;flex-shrink:0}
  .svc .stars{color:var(--coral);font-size:15px;letter-spacing:1px}
  .svc .date{font-size:11.5px;color:var(--ink-soft);margin-top:2px}
  .loading{padding:40px;text-align:center;color:var(--ink-soft);font-size:14px}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="wordmark">travala<span class="dot"></span></div>
    <a href="dashboard.html" class="nav-item"><span class="ic">▦</span>Dashboard</a>
    <a href="guide.html" class="nav-item"><span class="ic">🧭</span>City guide</a>
    <a href="help.html" class="nav-item"><span class="ic">🆘</span>Local help</a>
    <a href="money.html" class="nav-item"><span class="ic">💸</span>Money</a>
    <a href="recommendations.html" class="nav-item"><span class="ic">⭐</span>Rate &amp; recommend</a>
    <div class="spacer"></div>
    <a href="settings.html" class="nav-item"><span class="ic">⚙️</span>Settings</a>
  </aside>

  <main class="main">
    <div class="search">
      <input type="text" id="walletInput" placeholder="Paste a wallet address to check its real stamps…">
      <button onclick="lookup()">Check stamps</button>
    </div>
    <div id="content"><div class="loading">Enter a wallet address above - this reads that wallet's real, actually-minted TravelerCredential stamps, and each stamp's real ratings in its own city. Not a city you type in - the city comes from the NFT itself.</div></div>
  </main>
</div>
<script>
  const INDEXER_API = "https://indexer-y2zq.onrender.com";

  function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
  function stars(v){ return '★'.repeat(v) + '<span style="color:var(--line)">' + '★'.repeat(5-v) + '</span>'; }

  function renderStamp(stamp){
    const ratings = stamp.ratings || [];
    const avg = ratings.length ? ratings.reduce((s,r)=>s+r.value,0) / ratings.length : 0;
    const feesTotal = (ratings.length * 0.1).toFixed(1);

    return `
      <div class="hero">
        <div class="big-stamp"><div class="ring"></div><div class="city">${esc(stamp.city)}</div><div class="country">${esc(stamp.country)}</div><div style="font-size:11px;color:var(--coral);margin-top:14px;font-family:'SF Mono',monospace">NO. ${stamp.serial}</div></div>
        <div class="hero-info">
          <h1>${esc(stamp.city)}, ${esc(stamp.country)}</h1>
          <div class="meta">Real TravelerCredential stamp - token #${stamp.tokenId}, soulbound, minted onchain</div>
          <div class="badges"><span class="badge soul">◆ Read live from TravelerCredential + ServiceRating on Monad</span></div>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><div class="v">${ratings.length}</div><div class="l">services rated here</div></div>
        <div class="stat"><div class="v">${ratings.length ? avg.toFixed(1) : '–'}</div><div class="l">avg rating given</div></div>
        <div class="stat"><div class="v">${feesTotal} MON</div><div class="l">in network fees paid</div></div>
      </div>
      <div class="section-title">Ratings tied to this stamp <span style="font-size:12px;color:var(--coral);font-weight:500">on Monad</span></div>
      <div class="section-note">These are exactly this NFT's ratings - same owner wallet, same city the stamp was minted for - read directly from indexed onchain events.</div>
      ${ratings.length ? ratings.map(r => `
        <div class="svc">
          <div class="ic">⭐</div>
          <div class="info">
            <div class="nm">service ${esc(r.serviceId.slice(0,10))}…${esc(r.serviceId.slice(-6))}</div>
            ${r.tag ? `<span class="tag">${esc(r.tag)}</span>` : ''}
          </div>
          <div class="rate-col">
            <div class="stars">${stars(r.value)}</div>
            <div class="date">${new Date(r.timestamp*1000).toLocaleDateString()}</div>
          </div>
        </div>`).join('') : '<div class="loading" style="padding:20px 0">No ratings from this stamp\'s owner in this city yet.</div>'}
    `;
  }

  async function lookup(){
    const wallet = document.getElementById('walletInput').value.trim();
    const content = document.getElementById('content');
    if (!wallet || !/^0x[0-9a-fA-F]{40}$/.test(wallet)) {
      content.innerHTML = '<div class="loading">Enter a valid wallet address (0x...)</div>';
      return;
    }
    content.innerHTML = '<div class="loading">Reading real owned stamps…</div>';

    try {
      const res = await fetch(`${INDEXER_API}/wallets/${wallet}/stamps`);
      const stamps = await res.json();

      if (stamps.length === 0) {
        content.innerHTML = `<div class="loading">This wallet doesn't own any real TravelerCredential stamps yet - it hasn't minted one, or check the address.</div>`;
        return;
      }

      content.innerHTML = stamps.map(renderStamp).join('<hr style="border:none;border-top:1px solid var(--line-soft);margin:32px 0">');
    } catch (err) {
      content.innerHTML = `<div class="loading">Couldn't load stamps (${esc(err.message)}). The service may be waking up - try again in a few seconds.</div>`;
    }
  }

  const params = new URLSearchParams(window.location.search);
  const walletFromUrl = params.get('wallet');
  if (walletFromUrl) {
    document.getElementById('walletInput').value = walletFromUrl;
    lookup();
  } else if (localStorage.getItem('travala_wallet_key')) {
    // No wallet specified - default to checking this session's own real
    // wallet, derived the same way every other page does.
    import("https://esm.sh/ethers@6.14.0").then(({ ethers }) => {
      const address = new ethers.Wallet(localStorage.getItem('travala_wallet_key')).address;
      document.getElementById('walletInput').value = address;
      lookup();
    });
  }
</script>
</body>
</html>
